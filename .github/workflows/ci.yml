name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest

    env:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      JWT_SECRET: test-secret
      STREAMLIT_API_URL: http://127.0.0.1:8000

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --group dev --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    env:
      API_IMAGE: ghcr.io/${{ github.repository }}-api
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
      APP_IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.API_IMAGE }}:main

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:main

      - name: Set up SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Set up Ansible
        run: python -m pip install ansible

      - name: Create Ansible inventory
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          printf '[portfolio]\nportfolio-vps ansible_host=%s ansible_user=%s\n' "$VPS_HOST" "$VPS_USER" > deploy/ansible/inventory.ini

      - name: Deploy to VPS
        working-directory: deploy/ansible
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ansible-playbook playbook.yml \
            --extra-vars "admin_username=${ADMIN_USERNAME}" \
            --extra-vars "admin_password=${ADMIN_PASSWORD}" \
            --extra-vars "jwt_secret=${JWT_SECRET}" \
            --extra-vars "api_image=${API_IMAGE}" \
            --extra-vars "frontend_image=${FRONTEND_IMAGE}" \
            --extra-vars "app_image_tag=${APP_IMAGE_TAG}"
