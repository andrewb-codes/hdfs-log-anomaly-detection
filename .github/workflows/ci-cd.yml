name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: anomaly_test
          POSTGRES_USER: anomaly
          POSTGRES_PASSWORD: anomaly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anomaly -d anomaly_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://anomaly:anomaly@localhost:5432/anomaly_test
      JWT_SECRET: test-jwt-secret
      ENVIRONMENT: test
      LOG_LEVEL: INFO
      LOG_FORMAT: console
      SQL_LOG_LEVEL: WARNING
      RATE_LIMIT_ENABLED: "false"
      RATE_LIMIT_KEY_SECRET: test-rate-limit-secret
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --group dev --locked

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src tests

      - name: Run tests
        run: uv run pytest

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: anomaly-production-deploy
      cancel-in-progress: false

    env:
      API_IMAGE: ghcr.io/${{ github.repository }}-api
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
      APP_IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.API_IMAGE }}:main

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:main

      - name: Set up SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Set up Ansible
        run: python -m pip install ansible

      - name: Create Ansible inventory
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          printf '[portfolio]\nportfolio-vps ansible_host=%s ansible_user=%s\n' "$VPS_HOST" "$VPS_USER" > deploy/ansible/inventory.ini

      - name: Deploy to VPS
        working-directory: deploy/ansible
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RATE_LIMIT_KEY_SECRET: ${{ secrets.RATE_LIMIT_KEY_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          ansible-playbook playbook.yml \
            --extra-vars "postgres_password=${POSTGRES_PASSWORD}" \
            --extra-vars "jwt_secret=${JWT_SECRET}" \
            --extra-vars "rate_limit_key_secret=${RATE_LIMIT_KEY_SECRET}" \
            --extra-vars "s3_access_key_id=${S3_ACCESS_KEY_ID}" \
            --extra-vars "s3_secret_access_key=${S3_SECRET_ACCESS_KEY}" \
            --extra-vars "bootstrap_admin_password=${BOOTSTRAP_ADMIN_PASSWORD}" \
            --extra-vars "demo_password=${DEMO_PASSWORD}" \
            --extra-vars "api_image=${API_IMAGE}" \
            --extra-vars "frontend_image=${FRONTEND_IMAGE}" \
            --extra-vars "app_image_tag=${APP_IMAGE_TAG}"
