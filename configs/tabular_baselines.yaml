data_dir: data/preprocessed
reports_dir: reports/tabular_baselines
artifacts_dir: artifacts/tabular
save_model: true

run:
  models:
    - logistic_regression
    - isolation_forest
    - random_forest

split:
  test_size: 0.20
  val_size: 0.20
  random_state: 42

thresholding:
  strategy: max_f1

models:
  logistic_regression:
    enabled: true
    max_iter: 2000
    class_weight: balanced

  isolation_forest:
    enabled: true
    n_estimators: 300
    train_on_normal_only: true

  random_forest:
    enabled: true
    n_estimators: 300
    class_weight: balanced_subsample
