run_name: token_e32_h64_l1_d00
dataset_path: artifacts/lstm/one_step/dataset.npz
reports_dir: reports/lstm_one_step
artifacts_dir: artifacts/lstm/one_step
save_model: true

model:
  embedding_dim: 32
  hidden_size: 64
  num_layers: 1
  dropout: 0.0

training:
  batch_size: 256
  epochs: 5
  lr: 0.001
  weight_decay: 0.0
  seed: 42
  device: auto

early_stopping:
  enabled: true
  patience: 1
  min_delta: 0.0

scoring:
  strategy: top_k_miss_rate
  top_k: 3
  thresholding: max_f1
