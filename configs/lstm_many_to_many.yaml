run_name: token_all_e32_h64_l1_d00
dataset_path: artifacts/lstm/many_to_many/dataset.npz
reports_dir: reports/lstm_many_to_many
artifacts_dir: artifacts/lstm/many_to_many
save_model: true

model:
  embedding_dim: 32
  hidden_size: 64
  num_layers: 1
  dropout: 0.0

training:
  batch_size: 256
  epochs: 5
  lr: 0.001
  weight_decay: 0.0
  seed: 42
  device: auto

early_stopping:
  enabled: true
  patience: 2
  min_delta: 0.0

scoring:
  strategies:
    - topk_last
    - topk_all
    - topk_last3
    - nll_mean
    - nll_p95
    - nll_max
  top_k: 3
  thresholding: max_f1
