services:
  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - volatile-ttl
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - hdfs_anomaly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
      - ./configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      STREAMLIT_API_URL: "http://api:8000"
    ports:
      - "${STREAMLIT_PORT:?STREAMLIT_PORT is required}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)\"" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  hdfs_anomaly_postgres_data:
