services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      API_SECRET_KEY: "dev-secret-key"
      API_ADMIN_USERNAME: "admin"
      API_ADMIN_PASSWORD: "admin"
      API_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    volumes:
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
      - ./configs:/app/configs
