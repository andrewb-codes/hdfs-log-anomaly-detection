services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:?ADMIN_USERNAME is required}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
    volumes:
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
      - ./configs:/app/configs
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      STREAMLIT_API_URL: "http://api:8000"
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)\"" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
